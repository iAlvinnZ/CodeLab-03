<!doctype html>
<html>
  <head>
    <title>Checkboxes</title>
  </head>
  <body>
    <h2>Checkboxes</h2>
    <p>Choose the kind of things you like !</p>

    <form>
      <input type="checkbox" id="hobby1" name="hobby1" value="Games" />
      <label for="hobby1">Playing Games</label><br />
      <input type="checkbox" id="hobby2" name="hobby2" value="Exercise" />
      <label for="hobby2">Exercise</label><br />
      <input type="checkbox" id="hobby3" name="hobby3" value="Sleeping" />
      <label for="hobby3">Sleeping</label><br />
      <input type="checkbox" id="hobby4" name="hobby4" value="Studying" />
      <label for="hobby4">Studying</label><br />
    </form>
  </body>
</html>
